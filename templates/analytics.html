<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberGuard — Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root {
            --bg:#0a0e1a; --panel:#0f1625; --sidebar:#080c18; --card:#131929;
            --border:rgba(255,255,255,0.07); --cyan:#00e5ff; --blue:#2979ff;
            --purple:#7c4dff; --green:#00e676; --orange:#ff6d00; --red:#ff1744;
            --text:#e8eaf6; --muted:#5c6680; --sidebar-w:240px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100vh; display:flex; overflow:hidden; }

        /* SIDEBAR */
        .sidebar { width:var(--sidebar-w); background:var(--sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
        .logo { padding:28px 20px 24px; border-bottom:1px solid var(--border); }
        .logo-icon { font-size:28px; display:block; margin-bottom:8px; animation:pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{filter:drop-shadow(0 0 6px var(--cyan))} 50%{filter:drop-shadow(0 0 18px var(--cyan))} }
        .logo-title { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; color:var(--cyan); letter-spacing:2px; text-transform:uppercase; line-height:1.4; }
        .logo-sub { font-size:10px; color:var(--muted); margin-top:3px; font-family:'Space Mono',monospace; }
        nav { padding:20px 12px; flex:1; }
        .nav-section { font-size:9px; font-family:'Space Mono',monospace; color:var(--muted); letter-spacing:2px; text-transform:uppercase; padding:0 8px; margin:16px 0 8px; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; cursor:pointer; transition:all 0.2s; margin-bottom:2px; font-size:13px; color:var(--muted); text-decoration:none; position:relative; }
        .nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
        .nav-item.active { background:rgba(0,229,255,0.08); color:var(--cyan); border:1px solid rgba(0,229,255,0.15); }
        .nav-item.active::before { content:''; position:absolute; left:-12px; top:50%; transform:translateY(-50%); width:3px; height:60%; background:var(--cyan); border-radius:0 2px 2px 0; }
        .nav-icon { font-size:16px; width:20px; text-align:center; }
        
        /* MAIN */
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .topbar { height:60px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 28px; gap:16px; }
        .topbar-title { font-family:'Space Mono',monospace; font-size:13px; color:var(--cyan); letter-spacing:1px; }
        .content { flex:1; overflow-y:auto; padding:28px; display:flex; flex-direction:column; gap:20px; }

        /* STATS & CHARTS */
        .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; position:relative; }
        .stat-value { font-family:'Space Mono',monospace; font-size:28px; font-weight:700; color:var(--cyan); }
        .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .chart-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:24px; }
        .chart-title { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); text-transform:uppercase; margin-bottom:20px; }

        .sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); }
        .status-dot { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); }
        .dot { width:7px; height:7px; border-radius:50%; background:var(--green); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">
        <span class="logo-icon">🛡️</span>
        <div class="logo-title">CyberGuard<br>Intel System</div>
        <div class="logo-sub">v2.4.1 · ACTIVE</div>
    </div>
    <nav>
        <div class="nav-section">Main</div>
        <a href="/" class="nav-item">📊 Dashboard</a>
        <a href="/analytics" class="nav-item active">📈 Analytics</a>
        <a href="/logout" class="nav-item">🚪 Logout</a>
    </nav>
    <div class="sidebar-footer">
        <div class="status-dot"><div class="dot"></div><span>SYSTEM ONLINE</span></div>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <div class="topbar-title">OPERATIONAL ANALYTICS // DATA_STREAM</div>
    </div>
    <div class="content">
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value">4,281</div><div>TOTAL THREATS</div></div>
            <div class="stat-card"><div class="stat-value">12.4%</div><div>RISK INDEX</div></div>
            <div class="stat-card"><div class="stat-value">98</div><div>ACTIVE NODES</div></div>
            <div class="stat-card"><div class="stat-value">0</div><div>CRITICAL FAILS</div></div>
        </div>
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Threat Categories</div>
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Weekly Activity</div>
                <canvas id="activityChart"></canvas>
            </div>
        </div>
    </div>
</main>

<script>
    // Variables initialized only once to avoid "Cannot redeclare" error
    const cats = ["Theft", "Fraud", "Assault", "Cyber"];
    const dailyData = [12, 19, 3, 5, 2, 3, 7];

    const ctx1 = document.getElementById('categoryChart').getContext('2d');
    new Chart(ctx1, {
        type: 'doughnut',
        data: {
            labels: cats,
            datasets: [{
                data: [300, 50, 100, 80],
                backgroundColor: ['#00e5ff', '#2979ff', '#7c4dff', '#ff6d00']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const ctx2 = document.getElementById('activityChart').getContext('2d');
    new Chart(ctx2, {
        type: 'line',
        data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
                label: 'Threats Detected',
                data: dailyData,
                borderColor: '#00e5ff',
                tension: 0.4
            }]
        }
    });
</script>

</body>
</html>
